<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1: Voter Verification | ECI Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header gradient-primary text-white text-center py-5">
    <h1 class="d-flex align-items-center justify-content-center">
    <img src="Election_Commission_of_India_Logo.svg.png" 
         alt="ECI Logo" 
         style="height:50px; margin-right:15px;">
    Election Commission of India
</h1>
        <p class="lead mb-0"><strong>Step 1/4:</strong> Voter Identity Verification</p>
    </div>

    <div class="container mt-4">
        <div id="inputSection" class="row justify-content-center mb-5">
            <div class="col-lg-8 col-xl-6">
                <div class="card glass-effect shadow-lg border-0">
                    <div class="card-body p-5 text-center">
                        <i class="fas fa-id-card fa-3x text-primary mb-4"></i>
                        <h2 class="fw-bold mb-4">Enter Verification Details</h2>
                        
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-primary">
                                        <i class="fas fa-fingerprint text-primary"></i>
                                    </span>
                                    <input type="text" class="form-control form-control-lg border-primary fw-bold" 
                                           id="aadharNo" placeholder="12-digit Aadhaar" maxlength="12">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-success">
                                        <i class="fas fa-id-badge text-success"></i>
                                    </span>
                                    <input type="text" class="form-control form-control-lg border-success fw-bold" 
                                           id="voterId" placeholder="12-digit Voter ID" maxlength="12">
                                </div>
                            </div>
                        </div>

                        <button class="btn btn-primary btn-lg w-100 mt-4 py-3 fw-bold shadow-lg" onclick="verifyDetails()">
                            <span class="spinner-border spinner-border-sm d-none me-2" id="verifySpinner"></span>
                            <i class="fas fa-search me-2"></i>Verify & Display Profile
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="profileSection" class="row justify-content-center" style="display: none;">
            <div style="margin-left: 230px;" class="col-lg-10 col-xl-8" >
                <div class="card glass-effect shadow-xl border-0">
                    <div class="card-header bg-gradient-primary text-white text-center py-4">
                        <h3 style="color: black;" class="mb-0 fw-bold"><i class="fas fa-user-check me-2"></i>✅ Voter Profile Verified</h3>
                        <small style="color: black;">Physical verification by polling officer required</small>
                    </div>
                    <div class="card-body p-5">
                        <div class="row align-items-center">
                            <div class="col-md-3 text-center mb-4 mb-md-0">
                                <div class="profile-img-container">
                                    <img id="voterPhoto" src="" alt="Voter Photo" class="profile-img shadow-lg">
                                </div>
                            </div>
                            <div class="col-md-9">
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <div class="info-card bg-light rounded-3 p-4 shadow-sm">
                                            <h5><i class="fas fa-user text-primary me-2"></i>Full Name</h5>
                                            <h4 class="fw-bold text-dark mb-0" id="voterName">Loading...</h4>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="info-card bg-light rounded-3 p-4 shadow-sm">
                                            <h5><i class="fas fa-mobile-alt text-success me-2"></i>Mobile</h5>
                                            <h4 class="fw-bold text-success mb-0" id="voterMobile">Loading...</h4>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="info-card bg-warning rounded-3 p-4 shadow-sm">
                                            <h5><i class="fas fa-id-card text-dark me-2"></i>Verification Details</h5>
                                            <div class="row text-center">
                                                <div class="col-sm-6 mb-3">
                                                    <div class="fw-bold fs-5 text-primary" id="displayAadhar">-</div>
                                                    <small class="text-muted">Aadhaar No.</small>
                                                </div>
                                                <div class="col-sm-6 mb-3">
                                                    <div class="fw-bold fs-5 text-success" id="displayVoterId">-</div>
                                                    <small class="text-muted">Voter ID</small>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                        </div>
                        
                        <div class="text-center mt-5">
                            <button class="btn btn-success btn-lg px-5 py-3 fw-bold me-3" onclick="proceedToBiometric()">
                                <i class="fas fa-fingerprint me-2"></i>Proceed to Biometrics ✓
                            </button>
                            <button class="btn btn-outline-danger btn-lg px-5 py-3 fw-bold" onclick="resetVerification()">
                                <i class="fas fa-times me-2"></i>Invalid Voter
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
